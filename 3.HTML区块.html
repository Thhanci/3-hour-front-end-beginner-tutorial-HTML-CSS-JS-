    <a>	Anchor	锚（锚点）
    href	Hypertext Reference	超文本引用
    Anchor（锚）：想象成船锚，它可以把你的目光（或页面位置）固定或指向某个地方。在网页中，<a> 标签就是用来创建链接的，点击后可以跳转到另一个页面或位置。
    
    href（超文本引用）：是 <a> 标签的一个属性，用于指定链接的目标地址。它告诉浏览器当用户点击链接时应该导航到哪里。可以是一个 URL、一个锚点、或者一个相对路径。
    

    href="#" 中的 # 是一个空锚点，它的作用是：
    作用	说明
    占位符	表示这是一个链接，但暂时没有确定的目标地址
    页面内跳转	点击后页面会跳转到顶部（因为 # 默认指向页面最顶端）
    避免页面刷新	相对于 href="" 或 href="javascript:void(0)"，# 不会刷新页面，但会在 URL 后面添加 # 符号


    span标签是一个行内元素，通常用于对文本或其他行内元素进行分组和样式化。它本身没有任何语义意义，但可以通过CSS为其添加样式。span标签常用于以下场景：
    1. 样式化文本：可以使用span标签为特定的文本部分应用不同的样式，例如颜色、字体大小、字体样式等。
    2. JavaScript操作：可以使用span标签作为标识符，以便通过JavaScript对特定的文本或元素进行操作，例如添加事件监听器、修改内容等。
    3. 内联元素的分组：当需要对一段文本中的某   些部分进行分组时，可以使用span标签将其包裹起来，以便应用样式或进行操作。
