<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css 选择器</title>
    <style> 
         /*元素选择器*/
        h2{        
            color: aqua;
        }

        /*类选择器*/
        .highlight{     
            background-color: yellow;
        }

        /*ID选择器*/
        #header{            
            font-size: 35px;
        }

        /*通用选择器*/
        *{
            font-family: 'KaiTi';
            font-weight: bolder;
        }

        /*子元素选择器*/
        .father > .son{      /*优先级（例子 颜色）：ID>类>标签名*/
            color: yellowgreen;
        }

        /*后代选择器（包含选择器）*/
        .father p{      
            color: brown;
            font-size: larger;
        }

        /*相邻元素选择器*/
        h3 + p{      
            background-color: red;
        }
        
        /*伪类选择器（类比 事件）*/
        #element:hover{      
            background-color: blueviolet;
        }

        /*
        选中第一个子元素：first-child
        选中最后一个子元素：last-child
        选中第n个子元素：nth-child(n)
         点击时               :active 
        */

        /*  伪元素选择器
            ::after    在元素内容之后插入内容
            ::before   在元素内容之前插入内容
            ::first-letter  选中元素的首字母

        */

        .element1:active::first-letter {      
            background-color: lightblue;
        }

        .element1 p:nth-child(2){      
            background-color: lightgreen;
        }


    </style>

</head>


<body>
    <h1>不同类型的 CSS 选择器</h1>

    <h2>这是一个元素选择器</h2>
    <h3 class="highlight">这是一个类选择器示例</h3>
    <h3>这是另一个类选择器示例</h3>

    <h4 id="header">这是一个 ID 选择器示例</h4>

    <div class="father">
        <p class="son">这是一个子元素选择器示例</p>
        <div>
            <p>这是一个普通段落，不受子元素选择器影响</p>
        </div>
    </div>

    <p>这是一个普通的p标签</p>
    <h3>这是一个相邻兄弟选择器示例</h3>
    <p>这是另一个 p 标签</p>

    <h3 id="element">这是一个伪类选择器示例</h3>





    <div class="element1">
        <p class="son1">示例1</p>
        <p class="son2">示例2</p>
        <p class="son3">示例3</p>
    </div>
       


</body>
</html>

    选择器
    选择器是CSS中的关键部分，它允许你针对特定元素或一组元素定义样式
    元素选择器
    类选择器
    ID 选择器
    通用选择器

    并集选择器（兄弟选择器）

    选择器是CSS中用于选择和定位HTML元素的模式。通过选择器，你可以指定哪些元素应该应用特定的样式规则。

    常见的CSS选择器包括：

    元素选择器：直接使用HTML标签名来选择元素，例如p、h1、div等。
    类选择器：使用点号（.）后跟类名来选择具有特定类的元素，例如.class-name。
    ID选择器：使用井号（#）后跟ID名来选择具有特定ID的元素，例如#id-name。
    属性选择器：根据元素的属性值来选择元素，例如input[type="text"]。
    伪类选择器：用于选择处于特定状态的元素，例如:hover、:first-child等。
    组合选择器：可以组合多个选择器来更精确地定位元素，例如div.class-name > p:first-child。

    通过使用不同类型的选择器，你可以灵活地控制网页中各种元素的样式和布局。
 -->
