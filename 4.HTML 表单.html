<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 表单</title>
</head>
<body>
    
    <form>
        <input type="text" placeholder="请输入文本">
        <input type="text" value="请输入文本"><br>
    </form>

    <form>
        <label for="username">用户名：</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名"><br><br>

        <label for="pwd">密码：</label>
        <input type="password" id="pwd" name="password" placeholder="请输入密码"><br><br>

        <label >性别：</label>
        <input type="radio" name="gender" >男
        <input type="radio" name="gender" >女
        <input type="radio" name="gender" >沃尔玛购物袋 <br><br>

        <label for="hobby">爱好：</label>
        <input type="checkbox"  name="hobby" >唱歌
        <input type="checkbox"  name="hobby" >跳舞
        <input type="checkbox"  name="hobby" >RAP
        <input type="checkbox"  name="hobby" >篮球 <br><br>

        <input type="submit" value="提交">
    </form>

    <form action="#">
       
    </form>

</body>
</html>


<!-- 
    <form>	Form	表单
    表单 是网页中用来收集用户输入信息的区域，用户填写后可以提交到服务器。
    比如：登录框、注册页面、搜索框、评论框等，都是表单。    

    radio	Radio Button	单选按钮
    checkbox	Check Box	复选框/勾选框

    <input>	Input（输入）	输入框，类型多样（文本、密码、复选框等）
    <label>	Label（标签）	为输入控件添加文字说明
    <select>	Select（选择）	下拉菜单
    <option>	Option（选项）	下拉菜单的选项
    <textarea>	Text Area（文本区域）	多行文本输入框
    <button>	Button（按钮）	可点击的按钮    

    laber里面使用for，为的是后续用户点击用户名这个字的时候，光标也能自动聚焦到文本框让用户输入去

    属性	用途	能否被 for 绑定
    id	在页面中唯一标识一个元素，用于 CSS、JS 和 label 绑定	✅ 可以
    name	表单提交时的字段名称，用于数据传输	❌ 不可以
    for 属性内部查找的是 DOM 元素的 id，而不是 name。因为 id 必须在页面中唯一，而 name 可以重复（比如单选框 radio 就是通过相同的 name 来实现互斥的）。

    id="user-id" → 用于 label 绑定、CSS 样式、JavaScript 操作

    name="username" → 用于表单提交时服务器接收的字段名
    -->
