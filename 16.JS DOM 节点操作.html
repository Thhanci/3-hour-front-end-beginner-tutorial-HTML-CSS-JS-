<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格的增删改查</title>
    <style>
        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,td {
            border: 1px solid black;
            text-align: center;
            padding: 8px;
        }

        th{
            background-color: #ddd;
        }

        button{
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center">表格的增删改查</h1>
    <button onclick="addRow()">新增数据</button>
    <table id="table">
        <tr>
            <th>姓名</th>
            <th>联系方式</th>
            <th>操作</th>
        </tr>

        <tr>
            <td>张三</td>
            <td>25252</td>
            <td>
                <button onclick="editRow(this)">编辑</button><button onclick="deleteRow(this)">删除</button>
            </td>
        </tr>
    </table>

    <script src="./js/table.js"></script>
</body>
</html>

<!-- 

    在这个场景中，this 指的是当前被点击的“删除”按钮元素本身
    （即这个 <button> DOM 对象）。

        border-collapse 是 CSS 中专门用于表格的属性，
    它的作用是控制表格中相邻单元格的边框是合并还是分开。

    标签	作用	    通俗理解
    <form>	提交数据	用来收集用户输入并发送到服务器（登录、注册、搜索等）
    <table>	展示数据	用来以表格形式展示数据（名单、成绩表、价格表等）    

 -->
