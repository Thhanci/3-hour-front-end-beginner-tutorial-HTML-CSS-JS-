<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 导入方式</title>
    <link rel="stylesheet" href="./css/style.css">  <!--外部样式表-->

    <style>         /*内部样式表*/
        p{
            color: blue;
            font-size: 26px;
        }

        h2{
            color: green;
        }


        /* h3{
            color: green;
        }

        h1{
            color: antiqueWhite;
        } */

    </style>

</head>
<body>
    <p>这是一个应用了css样式的文本 This is a paragraph with blue text and 26px font size.</p>
    <h1 style="color: red;">这是一个一级标题标签，使用内联样式</h1>
    <h2>这是一个二级标题标签，使用内部样式</h2>
    <h3>这是一个三级标题标签，使用外部样式</h3>
</body>
</html>

<!-- 
    meta表示“变化”“变换”之义，charset表示“字符集”，viewport表示“视口”，content表示“内容”，width=device-width表示宽度等于设备宽度，initial-scale=1.0表示初始缩放比例为1.0。

    rel	Relationship	关系/关联  rel 属性用于定义当前文档与被链接资源之间的关系。

    相对路径是以你的html所在文件夹为起点向下找文件，绝对路径是磁盘里的确定位置，拿走了就会出错

    注释使用ctrl + / 快捷键，注释内容不会被浏览器解析和显示，可以用来添加说明、备注或者暂时隐藏代码。

    CSS全名是'Cascading Style Sheets，中文名层叠样式表。
    用于定义网页样式和布局的样式表语言。
    通过CSS，你可以指定页面中各个元素的颜色、字体、大小、间距、边框、背景等样式，从而实现更精确的页面设计。

    CSS通常由选择器、属性和属性值组成，多个规则可以组合在一起，以便同时应用多个样式
    选择器｛
    属性1：属性值1;
    属性2：属性值2;
    1.选择器的声明中可以写无数条属性
    2.声明的每一行属性，都需要以英文分号结尾；
    3.声明中的所有属性和值都是以键值对这种形式出现的；
    示例：
    /*这是一个p标签选择器*/
    p{
    color: blue;
    font-size: 16px;
    }

    下面是三种常见的CSS导入方式：
    1.内联样式（InlineStyles）
    2.内部样式表（InternalStylesheet）
    3.外部样式表（ExternalStylesheet）
    三种导入方式的优先级：内联样式>内部样式表>`外部样式表 (就近原则)

    内联样式是局部，内部样式是整个HTML文件，外部样式是整个网站

-->
