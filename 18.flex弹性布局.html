    ### Flex 盒子模型
        采用 Flex 布局的元素，称为 Flex 容器（flex container）。它的所有子元素自动成为容器成员，称为 Flex 项目（flex item）。


    ### flex-direction
        决定主轴的方向（即项目的排列方向）
    | 属性值 | 作用 |
    |--------|------|
    | row（默认值） | 主轴为水平方向，起点在左端（项目从左往右排列） |
    | row-reverse | 主轴为水平方向，起点在右端（项目从右往左排列） |
    | column | 主轴为垂直方向，起点在上沿（项目从上往下排列） |
    | column-reverse | 主轴为垂直方向，起点在下沿（项目从下往上排列） |


    ### flex-wrap
        默认情况下，项目都排列在一条轴线上，如果一条轴线排不下，换行方式
    | 属性值 | 作用 |
    |--------|------|
    | nowrap（默认） | 不换行（列） |
    | wrap | 主轴为横向时：从上到下换行；主轴为纵向时：从左到右换列 |
    | wrap-reverse | 主轴为横向时：从下到上换行；主轴为纵向时：从右到左换列 |


    ### justify-content
        定义了项目在主轴上的对齐方式
    | 属性值 | 作用 |
    |--------|------|
    | flex-start（默认） | 与主轴的起点对齐 |
    | flex-end | 与主轴的终点对齐 |
    | center | 与主轴的中点对齐 |
    | space-between | 两端对齐，主轴起点与终点，项目之间的间隔都相等 |
    | space-around | 每个项目两侧的间隔相等，项目之间的间隔比项目与边框的间隔大一倍 |


    ### align-items
        定义项目在交叉轴上如何对齐
    | 属性值 | 作用 |
    |--------|------|
    | flex-start | 交叉轴的起点对齐 |
    | flex-end | 交叉轴的终点对齐 |
    | center | 交叉轴的中点对齐 |
    | baseline | 项目的第一行文字的基线对齐 |
    | stretch（默认值） | 如果项目未设置高度或设为 auto，项目将占满整个容器的高度 |


    ### align-content
        定义了多根轴线的对齐方式。如果项目只有一根轴线，该属性不起作用。
    | 属性值 | 作用 |
    |--------|------|
    | flex-start | 与交叉轴的起点对齐 |
    | flex-end | 与交叉轴的终点对齐 |
    | center | 与交叉轴的中点对齐 |
    | space-between | 与交叉轴两端对齐，轴线之间的间隔平均分布 |
    | space-around | 每根轴线两侧的间隔都相等，轴线之间的间隔比轴线与边框的间隔大一倍 |
    | stretch（默认值） | 主轴轴线占满整个交叉轴 |

    flex-wrap 是 Flex 布局中的一个属性，用来控制 Flex 项目（子元素）在容器内换行 的方式。
        简单说就是：一行放不下了，是挤在一起，还是换到下一行？

    属性	作用	通俗理解
    flex-direction	控制主轴的方向	决定项目是横着排还是竖着排
    flex-wrap	控制是否换行	决定项目挤在一行还是换到下一行


    
    属性              作用（管什么）                            控制维度            关键属性值
    flex-direction    主轴方向（横着排还是竖着排）              方向                row, column, row-reverse, column-reverse
    flex-wrap         是否换行（一行挤不下怎么办）              换行                nowrap, wrap, wrap-reverse
    justify-content   主轴对齐（项目在主轴上的位置）            主轴                flex-start, center, space-between
    align-items       单行交叉轴对齐（项目在垂直方向上的位置）   交叉轴（单行）      flex-start, center, stretch
    align-content     多行交叉轴对齐（多行项目整体在垂直方向上的位置） 交叉轴（多行）  flex-start, center, space-between
 
    justify 使（文本）对齐  是……的正当理由   justice 公平，正义
