<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS 导入方式</title>

    <script>
        console.log('Hello, Head 标签的内联样式');
    </script>

    <script src="./js/myscript.js"></script>

</head>
<body>
    <h1>JavaScript 的导入方式</h1>
    <script>
        console.log('Hello, body 标签的内联样式');
        alert("你好，内联样式弹窗");
    </script>
</body>
</html>

<!-- 
    JavaScript 简称 JS.
            JavaScript是一种轻量级、解释型、面向对象的脚本语言。
        它主要被设计用于在网页上实现动态效果，增加用户与网页的交互性。
            作为一种客户端脚本语言，JavaScript可以直接嵌入HTML，并在浏览器中执行。
        与HTML和CSS不同，JavaScript使得网页不再是静态的，而是可以根据用户的操作动态变化的。 

    JavaScript在前端开发中扮演着重要的角色，其应用领域包括但不限于：
        客户端脚本`：用于在用户浏览器中执行，实现动态效果和用户交互。
        网页开发：与HTML和CSS协同工作，使得网页具有更强的交互性和动态性。
        后端开发：使用Node.js，JavaScript也可以在服务器端运行，实现服务器端应用的开发。


    alert()	Alert	警报/提醒
        alert() 用于在浏览器中弹出一个警告对话框，显示一段信息，并带有一个“确定”按钮。用户点击“确定”后对话框才会关闭。

-->
