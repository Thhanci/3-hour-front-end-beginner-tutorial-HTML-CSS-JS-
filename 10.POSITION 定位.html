<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position 定位</title>
    <style>
        .box1 {
            height: 350px;
            background-color: aqua;
            border: 2px solid black;
        }
        .box-normal {
            width: 100px;
            height: 100px;
            border: 2px solid orange;
            background-color: purple;
        }
        .box-relative {
            width: 100px;
            height: 100px;
            background-color: pink;
            border: 2px solid black;
            position: relative;
            top: 120px;
            left: 40px;
        }

        .box2 {
            height: 350px;
            background-color: yellow;
            margin-bottom: 300px;
            border: 2px solid black;
        }
        .box-absolute {
            width: 100px;
            height: 100px;
            background-color: yellowgreen;
            position: absolute;
            top: 55px;  
            left: 55px;
        }

        .box-fixed{
            width: 100px;
            height: 100px;
            background-color: blue;
            position: fixed;
            top: 150px;
            right: 0;
            border: 3px solid black;
        }
    </style>
</head>
<>
    <h1>相对定位</h1>
    <div class="box1">
        <div class="box-normal"></div>
        <div class="box-relative"></div>
        <div class="box-normal"></div>
    </div>
    
    <h1>绝对定位</h1>
    <div class="box2">
        <div class="box-normal"></div>
        <div class="box-absolute" style="border: 2px solid black;"></div>
        <div class="box-normal"></div>
    </div>

    <h1>固定定位</h1>  <!-- 顶部侧边栏 导航栏 广告 -->
    <div class="box-fixed"></div>
</body>
</html>


    
<!-- 
    定位布局可以精准定位，但缺乏灵活性
    定位方式：
        相对定位：相对于元素在文档流中的正常位置进行定位。
        绝对定位：相对于其最近的已定位祖先元素进行定位，不占据文档流。
        固定定位：相对于浏览器窗口进行定位。不占据文档流，固定在屏幕上的位置，不随滚动而移动。 



    position: absolute; 的定位方式可以概括为一句话：
        它相对于最近的一个开启了定位（position 值不是 static）的祖先元素进行定位，
        如果找不到，就相对于浏览器视口（即 <html> 根元素）进行定位。

    通常，相对定位就用于微调元素的位置，而绝对定位和固定定位呢，用于创建更复杂的布局

-->
